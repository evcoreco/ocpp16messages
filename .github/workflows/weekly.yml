name: Weekly

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: "0 6 * * 0" # 06:00 UTC weekly (Sunday)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    name: Test (${{ matrix.os }} / go${{ matrix.go }})
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        go:
          - 1.25.8
          - 1.26.1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run tests with coverage
        run: |
          go test -mod=readonly \
              -coverpkg=$(go list ./... | grep -v -e /scripts -e /tests -e tests_ | tr '\n' ',' | sed 's/,$//') \
              -coverprofile=reports/coverage.out \
              -v ./... | tee reports/unittest.txt

      - name: Coverage summary
        run: go tool cover -func=reports/coverage.out

      - name: Annotate coverage total
        run: |
          total="$(go tool cover -func=reports/coverage.out | tail -n 1 | awk '{print $NF}')"
          echo "::notice::Total coverage: ${total}"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-artifacts-${{ matrix.os }}-go${{ matrix.go }}-${{ github.run_number }}
          path: reports
          retention-days: 7

  test-example:
    name: Example tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.26.1
          cache: false

      - name: Run example tests
        run: go test -mod=readonly -run '^Example' -v ./...

